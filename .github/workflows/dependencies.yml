name: Dependency Updates

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: production
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for updates
        run: |
          echo "📋 Current dependency status:"
          npm outdated || true
          echo ""
          echo "🔍 Security audit:"
          npm audit || true

      - name: Update patch and minor versions
        run: |
          # Install npm-check-updates if not available
          npx npm-check-updates -u --target minor
          npm install

      - name: Run tests after updates
        run: |
          echo "🧪 Testing after dependency updates..."
          npm run lint || echo "⚠️ Linting failed"
          npm run test || echo "⚠️ Tests failed"
          npm run build || echo "⚠️ Build failed"

      - name: Check for breaking changes
        id: changes
        run: |
          # Check if package-lock.json was modified
          if git diff --quiet package-lock.json; then
            echo "No dependency changes"
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          else
            echo "Dependencies were updated"
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
            
            # Get list of updated packages
            echo "UPDATED_PACKAGES<<EOF" >> $GITHUB_OUTPUT
            npm list --depth=0 --json | jq -r '.dependencies | keys[]' | head -10 >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.HAS_CHANGES == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '🔄 Automated dependency updates'
          body: |
            ## 🔄 Automated Dependency Updates

            This PR updates dependencies to their latest compatible versions.

            ### 📦 Updated Packages
            ```
            ${{ steps.changes.outputs.UPDATED_PACKAGES }}
            ```

            ### ✅ Verification
            - [x] Dependencies updated to latest minor/patch versions
            - [x] Tests executed successfully
            - [x] Build completed without errors
            - [x] No major version updates (breaking changes avoided)

            ### 🔍 Review Checklist
            - [ ] Review the dependency changes
            - [ ] Ensure all tests pass in CI
            - [ ] Check for any new security vulnerabilities
            - [ ] Verify build artifacts are correct

            ### 🤖 Automation
            This PR was created automatically by the dependency update workflow.
            It only includes minor and patch updates to minimize breaking changes.

            ---

            📅 **Created**: $(date)
            🔧 **Workflow**: `.github/workflows/dependencies.yml`
          branch: automated/dependency-updates
          base: production
          delete-branch: true

  security-updates:
    name: Security Updates
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: production
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        id: audit
        run: |
          echo "🔍 Running security audit..."
          npm audit --json > audit-results.json || true

          # Check if there are vulnerabilities
          VULN_COUNT=$(cat audit-results.json | jq '.metadata.vulnerabilities.total // 0')
          echo "VULNERABILITY_COUNT=$VULN_COUNT" >> $GITHUB_OUTPUT

          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "⚠️ Found $VULN_COUNT vulnerabilities"
            echo "NEEDS_SECURITY_UPDATE=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No vulnerabilities found"
            echo "NEEDS_SECURITY_UPDATE=false" >> $GITHUB_OUTPUT
          fi

      - name: Apply security fixes
        if: steps.audit.outputs.NEEDS_SECURITY_UPDATE == 'true'
        run: |
          echo "🔧 Applying security fixes..."
          npm audit fix --force || true

          # Run tests to ensure fixes don't break anything
          npm run test || echo "⚠️ Tests failed after security fixes"
          npm run build || echo "⚠️ Build failed after security fixes"

      - name: Create Security Update PR
        if: steps.audit.outputs.NEEDS_SECURITY_UPDATE == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'security: fix vulnerabilities'
          title: '🔒 Security: Fix vulnerabilities'
          body: |
            ## 🔒 Security Updates

            This PR addresses security vulnerabilities found in dependencies.

            ### 🚨 Vulnerabilities Found
            Found **${{ steps.audit.outputs.VULNERABILITY_COUNT }}** vulnerabilities that need attention.

            ### 🔧 Actions Taken
            - [x] Ran `npm audit fix` to automatically resolve issues
            - [x] Tested build process after fixes
            - [x] Verified core functionality still works

            ### ⚠️ Important
            - **Priority**: HIGH - Security vulnerabilities should be addressed quickly
            - **Testing**: Please run full test suite to ensure no regressions
            - **Review**: Check that all security issues have been resolved

            ### 📋 Next Steps
            1. Review the changes carefully
            2. Run the full test suite
            3. Deploy to staging environment for testing
            4. Merge and deploy to production

            ---

            🤖 This PR was created automatically by the security update workflow.
          branch: security/automated-fixes
          base: production
          delete-branch: true
