name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  test:
    name: Pre-release Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: production # Ensure we're on production branch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: |
          npm run lint
          npm run format:check
          npm run test:coverage
          npm run build
          npm run test:all-envs
          npm run build:analyze

      - name: Run quality checks
        run: npm run quality:check

      - name: Verify package contents
        run: |
          npm pack
          tar -tf *.tgz > package-contents.txt
          echo "📦 Package contents:"
          cat package-contents.txt

          # Verify required files are present
          required_files=("dist/index.js" "dist/index.cjs" "dist/index.esm.js" "types/index.d.ts")
          for file in "${required_files[@]}"; do
            if grep -q "$file" package-contents.txt; then
              echo "✅ $file found in package"
            else
              echo "❌ $file missing from package"
              exit 1
            fi
          done

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: production

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package version
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          npm version ${VERSION#v} --no-git-tag-version

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create package artifact
        run: npm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v3
        with:
          name: npm-package-${{ steps.version.outputs.VERSION }}
          path: '*.tgz'

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: production
          fetch-depth: 0 # Fetch full history for changelog

      - name: Extract version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "CLEAN_VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Download package artifact
        uses: actions/download-artifact@v3
        with:
          name: npm-package-${{ steps.version.outputs.VERSION }}

      - name: Generate release notes
        id: release_notes
        run: |
          # Extract changelog section for this version
          if [ -f CHANGELOG.md ]; then
            # Get the section for this version from CHANGELOG.md
            sed -n "/## \[${CLEAN_VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1 > release-notes.md
            
            # If no specific version found, use the unreleased section
            if [ ! -s release-notes.md ]; then
              echo "## What's New in ${{ steps.version.outputs.VERSION }}" > release-notes.md
              echo "" >> release-notes.md
              echo "For detailed changes, see [CHANGELOG.md](CHANGELOG.md)" >> release-notes.md
            fi
          else
            echo "## Release ${{ steps.version.outputs.VERSION }}" > release-notes.md
            echo "" >> release-notes.md
            echo "See commit history for changes in this release." >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: release-notes.md
          files: '*.tgz'
          draft: false
          prerelease: false
          target_commitish: production
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Post-release Notifications
    runs-on: ubuntu-latest
    needs: [publish, github-release]
    if: always()

    steps:
      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Notify success
        if: needs.publish.result == 'success' && needs.github-release.result == 'success'
        run: |
          echo "🎉 Successfully released rule-engine-js ${{ steps.version.outputs.VERSION }}"
          echo "📦 npm: https://www.npmjs.com/package/rule-engine-js"
          echo "🐙 GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}"

      - name: Notify failure
        if: needs.publish.result == 'failure' || needs.github-release.result == 'failure'
        run: |
          echo "❌ Release ${{ steps.version.outputs.VERSION }} failed"
          echo "📋 Check the workflow logs for details"
          exit 1
