name: CI

on:
  push:
    branches: [production, develop]
  pull_request:
    branches: [production]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16, 18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting (Node.js 18+ only)
        if: matrix.node-version >= 18
        run: npm run lint

      - name: Check formatting (Node.js 18+ only)
        if: matrix.node-version >= 18
        run: npm run format:check

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == 18
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build and Test Distributions
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all formats
        run: npm run build

      - name: Analyze bundle size
        run: npm run build:analyze

      - name: Test package contents
        run: |
          npm pack
          tar -tf *.tgz

      - name: Test import methods
        run: npm run test:all-envs

      - name: Validate build outputs
        run: |
          echo "✅ Validating build outputs..."
          
          # Check expected files exist
          test -f dist/index.js && echo "✅ Main build exists"
          test -f dist/index.esm.js && echo "✅ ESM build exists" 
          test -f dist/index.cjs && echo "✅ CJS build exists"
          test -f types/index.d.ts && echo "✅ TypeScript definitions exist"
          
          # Basic syntax validation
          node -c dist/index.cjs && echo "✅ CJS build syntax valid"
          
          echo "🎉 All builds validated"

      - name: Store build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: |
            dist/
            types/
          retention-days: 30
